<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPN Dashboard | โรงพยาบาลศรีนครินทร์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', 'Inter', sans-serif; }
    body { background-color: #f8fafc; }
    .gradient-header { background: linear-gradient(135deg, #006d77 0%, #004d54 100%); }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    .filter-label {
      font-size: 14px !important;
      font-weight: 800 !important;
      color: #334155 !important;
      margin-bottom: 8px !important;
      display: block;
    }

    #wardFilterDropdown::-webkit-scrollbar { width: 6px; }
    #wardFilterDropdown::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .card-tpn {
      background: white;
      border-radius: 2rem;
      border: 1px solid #e2e8f0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-tpn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -8px rgba(0, 109, 119, 0.15);
      border-color: #83c5be;
    }
  </style>
</head>
<body class="min-h-full">

  <header class="gradient-header text-white py-5 px-6 sticky top-0 z-50 shadow-xl">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md border border-white/30 shadow-inner">
            <span class="text-2xl">📊</span>
        </div>
        <div>
          <h1 class="text-xl font-black tracking-tight uppercase">TPN Order Dashboard</h1>
          <p class="text-teal-100 text-[11px] font-bold uppercase tracking-widest opacity-80">Srinagarind Hospital | Adult TPN System</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
          <a href="index.html" class="px-6 py-3 bg-[#e29578] hover:bg-[#d88466] text-white rounded-2xl transition-all text-sm font-bold shadow-lg flex items-center gap-2">
            <span class="text-lg">+</span> สั่ง TPN ใหม่
          </a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4 md:p-8">
    
    <div class="bg-white rounded-[2.5rem] shadow-sm p-8 mb-8 border border-gray-200">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
        <div class="flex flex-col">
          <label class="filter-label">🗓️ วันที่สั่ง Order</label>
          <input type="date" id="filterDate" class="px-5 py-3 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:bg-white focus:border-[#006d77] outline-none text-base font-bold transition-all" onchange="renderCards()">
        </div>
        
        <div class="flex flex-col relative">
          <label class="filter-label">🏥 หอผู้ป่วย (Ward)</label>
          <input type="text" id="filterWardInput" placeholder="ค้นหา Ward..." class="px-5 py-3 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:bg-white focus:border-[#006d77] outline-none text-base font-bold transition-all" onfocus="showWardDropdown()" oninput="filterWardOptions()" autocomplete="off">
          <input type="hidden" id="filterWardValue">
          <div id="wardFilterDropdown" class="hidden absolute left-0 right-0 top-[105%] z-[100] bg-white border border-gray-200 rounded-3xl shadow-2xl max-h-64 overflow-y-auto p-2">
            <div id="wardFilterOptions"></div>
          </div>
        </div>

        <div class="flex flex-col">
          <label class="filter-label">🔍 ค้นหา HN / ชื่อ</label>
          <input type="text" id="filterSearch" placeholder="ระบุ HN หรือชื่อคนไข้..." class="px-5 py-3 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:bg-white focus:border-[#006d77] outline-none text-base font-bold transition-all" oninput="renderCards()">
        </div>

        <div class="flex items-center gap-3">
          <button onclick="clearAllFilters()" class="px-5 py-3 bg-white text-gray-500 rounded-2xl font-bold text-sm border-2 border-gray-100 hover:bg-gray-50 transition-all">ล้าง</button>
          <button onclick="fetchOrders()" class="flex-1 px-5 py-3 bg-[#006d77] text-white rounded-2xl font-bold text-sm shadow-lg hover:bg-[#005a63] transition-all flex items-center justify-center gap-2">
            <span>🔄</span> รีเฟรช
          </button>
          <div class="bg-teal-50 px-5 py-3 rounded-2xl border border-teal-100 flex items-center gap-2">
              <span class="text-xs font-black text-teal-600 uppercase">Total</span>
              <span id="caseCount" class="text-2xl font-black text-[#006d77]">0</span>
          </div>
        </div>
      </div>
    </div>

    <div id="cardContainer" class="grid grid-cols-1 gap-5 animate-fade-in pb-20">
        <div class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-[#006d77] border-t-transparent"></div>
            <p class="mt-4 text-slate-500 font-bold text-lg">กำลังโหลดข้อมูล Order TPN...</p>
        </div>
    </div>
  </main>

  <script>
    // ⚠️ ยามเฝ้าประตู: เช็คว่า Login หรือยัง?
if (!sessionStorage.getItem('tpnUser')) {
  alert("⚠️ กรุณาเข้าสู่ระบบก่อนใช้งานนะคะ");
  window.location.href = "index.html"; // ดีดกลับหน้า Login
}
    // ⚠️ อย่าลืมนำ API URL จาก Google Apps Script มาใส่ตรงนี้นะครับ
    const API_URL = 'https://script.google.com/macros/s/AKfycbzHW45hr0FXMK5VwX4zcHp-Rw6M4e5UCwZuUAoldNI9WfWlndSk9J10HDCJ43ZsscqIwA/exec';
    let allOrders = [];

    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('filterDate').value = today;
        fetchOrders();
    });

    async function fetchOrders() {
      const container = document.getElementById('cardContainer');
      try {
        const response = await fetch(`${API_URL}?action=getData&ts=${new Date().getTime()}`);
        allOrders = await response.json();
        renderCards();
      } catch (e) { 
          container.innerHTML = `<div class="text-center py-20 bg-red-50 rounded-[3rem] border-2 border-dashed border-red-200">
            <p class="text-red-600 font-bold text-xl">❌ ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>
            <p class="text-red-400 text-sm mt-2">กรุณาตรวจสอบการ Deploy Web App หรือ Internet</p>
          </div>`; 
      }
    }

    // --- Ward Filtering Logic ---
    function showWardDropdown() {
      const dropdown = document.getElementById('wardFilterDropdown');
      dropdown.classList.remove('hidden');
      const wards = [...new Set(allOrders.map(o => o.ward).filter(w => w))].sort();
      renderWardFilterOptions(wards);
    }
    function filterWardOptions() {
      const searchTerm = document.getElementById('filterWardInput').value.toLowerCase();
      const wards = [...new Set(allOrders.map(o => o.ward).filter(w => w))].sort();
      renderWardFilterOptions(wards.filter(w => w.toLowerCase().includes(searchTerm)));
    }
    function renderWardFilterOptions(list) {
      const container = document.getElementById('wardFilterOptions');
      container.innerHTML = `<div onclick="selectWardFilter('')" class="px-5 py-3 hover:bg-teal-50 cursor-pointer text-[#006d77] text-base font-bold rounded-xl mb-1 italic">แสดงทั้งหมด</div>` + 
        list.map(w => `<div onclick="selectWardFilter('${w}')" class="px-5 py-3 hover:bg-gray-50 cursor-pointer text-slate-700 text-base font-bold rounded-xl mb-1">${w}</div>`).join('');
    }
    function selectWardFilter(val) {
      document.getElementById('filterWardInput').value = val || "";
      document.getElementById('filterWardValue').value = val;
      document.getElementById('wardFilterDropdown').classList.add('hidden');
      renderCards();
    }
    function clearAllFilters() { 
        document.getElementById('filterDate').value = ""; 
        document.getElementById('filterWardInput').value = ""; 
        document.getElementById('filterWardValue').value = ""; 
        document.getElementById('filterSearch').value = ""; 
        renderCards(); 
    }

    // --- Render Cards ---
    function renderCards() {
      const container = document.getElementById('cardContainer');
      const countEl = document.getElementById('caseCount');
      const fDate = document.getElementById('filterDate').value;
      const fWard = document.getElementById('filterWardValue').value;
      const fSearch = document.getElementById('filterSearch').value.toLowerCase();

      const filtered = allOrders.filter(o => {
        let matchDate = true;
        if (fDate && o.order_date) {
          const d = new Date(o.order_date);
          const formattedO = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          matchDate = (formattedO === fDate);
        }
        const matchWard = fWard ? o.ward === fWard : true;
        const matchSearch = fSearch ? (
            (o.hn && o.hn.toString().toLowerCase().includes(fSearch)) || 
            (o.patient_name && o.patient_name.toLowerCase().includes(fSearch))
        ) : true;
        return matchDate && matchWard && matchSearch;
      });

      countEl.textContent = filtered.length;
      if (filtered.length === 0) { 
          container.innerHTML = `<div class="text-center py-24 bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
            <span class="text-5xl block mb-6">🔍</span>
            <p class="text-slate-400 font-bold text-xl italic">ไม่พบรายการ TPN ที่ตรงตามเงื่อนไข</p>
          </div>`; 
          return; 
      }

      container.innerHTML = [...filtered].reverse().map(order => {
        const isCentral = order.route?.toLowerCase().includes('central');
        return `
        <div class="card-tpn p-8 animate-fade-in">
          <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-8">
            
            <div class="flex items-center gap-8 flex-1">
              <div class="w-3 h-20 rounded-full ${isCentral ? 'bg-orange-400' : 'bg-[#83c5be]'} shadow-sm"></div>
              
              <div>
                <div class="flex items-center gap-4 mb-2">
                  <span class="text-4xl font-black text-slate-800">${order.ward || '-'}</span>
                  <span class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest border ${isCentral ? 'bg-orange-50 text-orange-700 border-orange-200' : 'bg-teal-50 text-teal-700 border-teal-200'}">
                    ${order.route || 'N/A'}
                  </span>
                </div>
                <h3 class="text-2xl font-extrabold text-slate-800 mb-2">${order.patient_name || 'ไม่ระบุชื่อคนไข้'}</h3>
                <div class="flex gap-4">
                  <span class="text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-lg">HN: ${order.hn || '-'}</span>
                  <span class="text-sm font-black text-[#006d77] bg-teal-50 px-3 py-1 rounded-lg border border-teal-100">BW: ${order.bw || '0'} kg</span>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
              <div class="bg-slate-50 border border-slate-100 rounded-3xl p-4 text-center min-w-[120px]">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-tighter">PN Volume</p>
                <p class="text-2xl font-black text-slate-700">${order.pn_volume_net || '0'}<span class="text-xs ml-0.5">ml</span></p>
              </div>
              <div class="bg-teal-50 border border-teal-100 rounded-3xl p-4 text-center min-w-[120px]">
                <p class="text-[10px] font-black text-[#006d77] uppercase mb-1 tracking-tighter">Calories</p>
                <p class="text-2xl font-black text-[#006d77]">${order.total_calories || '0'}<span class="text-xs ml-0.5">kcal</span></p>
              </div>
              <div class="bg-orange-50 border border-orange-100 rounded-3xl p-4 text-center min-w-[120px]">
                <p class="text-[10px] font-black text-orange-700 uppercase mb-1 tracking-tighter">Osmolarity</p>
                <p class="text-2xl font-black text-orange-600">${order.final_osmolarity || '0'}</p>
              </div>
            </div>

            <div class="flex lg:flex-col gap-3">
<button onclick="const d = new Date('${order.order_date}'); const fmtDate = d.getFullYear()+'-'+String(d.getMonth() + 1).padStart(2, '0')+'-'+String(d.getDate()).padStart(2, '0'); window.open('label_WS.html?hn=${order.hn}&date=' + fmtDate, '_blank')" class="px-8 py-3.5 bg-[#006d77] hover:bg-[#004d54] text-white rounded-2xl text-sm font-bold shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-3">
  <span>📝</span> ฉลาก / Worksheet
</button>
              <button onclick="deleteOrder('${order.hn}', '${order.order_date}')" class="px-8 py-3.5 bg-white hover:bg-red-50 text-red-500 border-2 border-red-50 rounded-2xl text-sm font-bold transition-all">
  🗑️ OFF TPN
</button>
            </div>

          </div>
        </div>`;
      }).join('');
    }

  // ✅ แก้ไขฟังก์ชัน deleteOrder ให้ทำงานได้จริง
    async function deleteOrder(hn, rawDate) {
      // 1. แปลงวันที่ให้เป็นรูปแบบ yyyy-mm-dd เพื่อส่งไปหา Database
      const d = new Date(rawDate);
      const fmtDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

      // 2. ถามเพื่อยืนยันป้องกันการกดพลาด
      if (!confirm(`⚠️ ยืนยันการสั่ง OFF TPN สำหรับ HN: ${hn}?\n(Order ของวันที่: ${fmtDate})\n\nข้อมูลจะถูกลบออกจากระบบถาวร`)) return;
      
      try {
        // 3. ส่งคำสั่ง delete ไปที่ Google Apps Script
        const response = await fetch(`${API_URL}?action=delete&hn=${encodeURIComponent(hn)}&date=${fmtDate}`);
        const result = await response.text();

        if (result === "SUCCESS") {
          alert("✅ OFF TPN เรียบร้อยแล้ว");
          fetchOrders(); // รีเฟรชรายการในหน้าจอใหม่ทันที
        } else {
          alert("❌ ไม่สามารถลบได้: " + result);
        }
      } catch (e) {
        alert("❌ เชื่อมต่อระบบเพื่อลบข้อมูลไม่ได้");
      }
    }

    // ปิด Dropdown เมื่อคลิกข้างนอก (อันนี้คงไว้เหมือนเดิม)
    document.addEventListener('click', (e) => {
        const wardInput = document.getElementById('filterWardInput');
        if (wardInput && !wardInput.parentElement.contains(e.target)) {
            document.getElementById('wardFilterDropdown').classList.add('hidden');
        }
    });
  </script>
</body>
</html>
